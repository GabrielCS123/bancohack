{% extends "base.html" %}

{% block title %}ZicaPay — Criar conta{% endblock %}

{% block page_content %}
<div class="auth-container">

  <!-- Header com volta -->
  <div style="background:var(--gradient-primary);padding:16px 20px;display:flex;align-items:center;gap:12px;">
    <a href="{{ url_for('login') }}" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0;">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <div>
      <p style="color:rgba(255,255,255,0.8);font-size:0.75rem;">ZicaPay</p>
      <h1 style="color:white;font-size:1.25rem;font-weight:800;">Criar conta</h1>
    </div>
  </div>

  <!-- Body -->
  <div style="padding:24px 20px;padding-bottom:40px;">
    <div class="auth-card animate-fade-up" style="border-radius:20px;">
      <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:24px;">Preencha seus dados para criar sua conta ZicaPay grátis.</p>

      <form method="POST" action="{{ url_for('cadastro') }}" id="register-form">
        <div style="display:flex;flex-direction:column;gap:16px;">

          <div class="form-group">
            <label class="form-label" for="nome">Nome completo</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              </span>
              <input class="form-input form-input--icon" type="text" id="nome" name="nome" placeholder="Seu nome completo" required autocomplete="name">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">E-mail</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              </span>
              <input class="form-input form-input--icon" type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="cpf">CPF</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/></svg>
              </span>
              <input class="form-input form-input--icon" type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required data-mask="cpf" inputmode="numeric">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="telefone">Telefone / WhatsApp</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              </span>
              <input class="form-input form-input--icon" type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required data-mask="phone">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="senha">Senha</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              </span>
              <input class="form-input form-input--icon" type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" minlength="6">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmar_senha">Confirmar senha</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
              </span>
              <input class="form-input form-input--icon" type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Repita sua senha" required autocomplete="new-password">
            </div>
            <div id="senha-match" style="font-size:0.75rem;display:none;"></div>
          </div>

          <!-- Senha strength -->
          <div id="strength-bar" style="display:none;">
            <div style="height:4px;background:var(--border);border-radius:4px;overflow:hidden;">
              <div id="strength-fill" style="height:100%;width:0%;background:var(--danger);transition:all 0.3s;border-radius:4px;"></div>
            </div>
            <p id="strength-text" style="font-size:0.7rem;color:var(--text-muted);margin-top:4px;"></p>
          </div>

          <div style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;">
            <input type="checkbox" id="termos" required style="width:16px;height:16px;accent-color:var(--primary);margin-top:2px;flex-shrink:0;">
            <label for="termos" style="font-size:0.8rem;color:var(--text-secondary);line-height:1.5;">Concordo com os <span style="color:var(--primary);font-weight:600;">Termos de Uso</span> e <span style="color:var(--primary);font-weight:600;">Política de Privacidade</span> do ZicaPay</label>
          </div>

          <button type="submit" class="btn btn--primary btn--full btn--lg" id="btn-register">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
            Criar minha conta
          </button>
        </div>
      </form>
    </div>

    <div style="text-align:center;padding:16px 0 24px;">
      <span style="color:var(--text-secondary);font-size:0.875rem;">Já tem conta? </span>
      <a href="{{ url_for('login') }}" style="color:var(--primary);font-weight:700;font-size:0.875rem;">Entrar →</a>
    </div>
  </div>
</div>

<script>
const senhaInput = document.getElementById('senha');
const confirmarInput = document.getElementById('confirmar_senha');
const matchDiv = document.getElementById('senha-match');
const strengthBar = document.getElementById('strength-bar');
const strengthFill = document.getElementById('strength-fill');
const strengthText = document.getElementById('strength-text');

senhaInput.addEventListener('input', () => {
  const v = senhaInput.value;
  strengthBar.style.display = v ? 'block' : 'none';
  let score = 0;
  if (v.length >= 6) score++;
  if (v.length >= 10) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ['#EF4444','#F59E0B','#F59E0B','#21C25E','#0E9F4B'];
  const labels = ['Muito fraca','Fraca','Razoável','Forte','Muito forte'];
  strengthFill.style.width = (score * 20) + '%';
  strengthFill.style.background = colors[score-1] || colors[0];
  strengthText.textContent = labels[score-1] || '';
});

confirmarInput.addEventListener('input', () => {
  if (!confirmarInput.value) { matchDiv.style.display = 'none'; return; }
  matchDiv.style.display = 'block';
  if (confirmarInput.value === senhaInput.value) {
    matchDiv.textContent = '✓ Senhas coincidem';
    matchDiv.style.color = 'var(--success)';
  } else {
    matchDiv.textContent = '✗ Senhas não coincidem';
    matchDiv.style.color = 'var(--danger)';
  }
});

document.getElementById('register-form').addEventListener('submit', function(e) {
  if (senhaInput.value !== confirmarInput.value) {
    e.preventDefault();
    ZicaPay.showToast('As senhas não coincidem!', 'erro');
    return;
  }
  const btn = document.getElementById('btn-register');
  btn.classList.add('btn--loading');
  btn.textContent = 'Criando conta...';
});
</script>
{% endblock %}
