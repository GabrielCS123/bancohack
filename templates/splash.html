{% extends "base.html" %}

{% block title %}ZicaPay — Bem-vindo{% endblock %}

{% block full_page %}
<div class="splash-screen" id="splash">
  <div class="splash-logo-wrap">
    <div class="zica-logo" style="flex-direction:column;gap:12px;align-items:center;">
      <!-- Z Icon -->
      <div style="width:88px;height:88px;background:rgba(255,255,255,0.15);border-radius:28px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.3);backdrop-filter:blur(8px);">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 12H42L16 40H42" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="zica-logo-text">Zica<span>Pay</span></div>
    </div>
  </div>
  <p class="splash-tagline">Seu dinheiro, do seu jeito</p>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<script>
  // Redirecionar após 2.5s
  setTimeout(() => {
    window.location.href = "{{ url_for('login') }}";
  }, 2500);
</script>
{% endblock %}
